<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Sai Lasya & Chakradhar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Playfair Display', serif; }
        .lucide { display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple wrapper for Lucide icons since we are in a browser
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [timeLeft, setTimeLeft] = useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });
            const weddingDate = new Date('2026-04-26T02:30:00').getTime();

            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date().getTime();
                    const distance = weddingDate - now;
                    if (distance < 0) { clearInterval(timer); return; }
                    setTimeLeft({
                        days: Math.floor(distance / (1000 * 60 * 60 * 24)),
                        hours: Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
                        minutes: Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)),
                        seconds: Math.floor((distance % (1000 * 60)) / 1000),
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const invitationData = {
                bride: "Guru Sai Lasya",
                groom: "Chakradhar Reddy",
                brideParents: { mother: "Smt. R.B. Sathyavathi", father: "Sri D. Guru Prasad" },
                groomParents: "Smt. A. Leelavathi & Sri A. Madhusudhana Reddy",
                weddingDate: "Sunday, 26th April 2026",
                weddingTime: "2:30 AM to 3:30 AM",
                muhurtham: "Makha Nakshathram, Kumbha Lagnam",
                venue: "Shree Convention, Hall-2",
                address: "Lane Beside Srinivasam, Korlagunta, Tirupati.",
                receptionDate: "Saturday, 25th April 2026",
                receptionTime: "6:30 PM onwards",
            };

            const handleOpenMaps = () => {
                const query = encodeURIComponent(`${invitationData.venue} ${invitationData.address}`);
                window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
            };

            const handleSaveDate = () => {
                const title = encodeURIComponent(`Wedding: ${invitationData.bride} & ${invitationData.groom}`);
                const details = encodeURIComponent(`Sumuhurtham: ${invitationData.muhurtham}`);
                const location = encodeURIComponent(`${invitationData.venue}, ${invitationData.address}`);
                const calendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=20260425T210000Z/20260425T223000Z&details=${details}&location=${location}`;
                window.open(calendarUrl, '_blank');
            };

            return (
                <div className="min-h-screen bg-[#FFFDF6] text-[#4A0E0E] flex flex-col items-center overflow-x-hidden w-full">
                    <div className="w-full bg-[#8B0000] py-3 border-b border-[#D4AF37]">
                        <div className="flex justify-center gap-3 text-[10px] font-bold tracking-[0.15em] text-[#D4AF37] px-4 text-center">
                            <span>SRIRASTHU</span><span>SUBHAMASTHU</span><span>AVIGHNAMASTHU</span>
                        </div>
                    </div>

                    <header className="w-full max-w-xl text-center px-4 pt-12 pb-8 space-y-6">
                        <p className="text-[#B8860B] uppercase tracking-[0.3em] text-[10px] font-bold">Wedding Invitation</p>
                        <h2 className="text-lg italic text-[#8B0000] font-semibold flex flex-col items-center">
                            <span>{invitationData.brideParents.mother}</span>
                            <span className="text-sm font-normal py-1 opacity-60">&</span>
                            <span>{invitationData.brideParents.father}</span>
                        </h2>
                        <p className="text-[10px] uppercase tracking-widest text-gray-500 font-medium max-w-[280px] mx-auto">
                            solicit your gracious presence with family on the auspicious occasion of the wedding of their elder daughter
                        </p>
                        
                        <div className="py-6">
                            <span className="block italic text-lg text-[#B8860B]">Chi. La. Sow.</span>
                            <h1 className="text-4xl font-medium text-[#4A0E0E]">{invitationData.bride}</h1>
                            <div className="flex items-center justify-center gap-4 my-4">
                                <Icon name="heart" size={18} className="text-[#B8860B] fill-[#B8860B]" />
                            </div>
                            <span className="block italic text-lg text-[#B8860B]">Chi.</span>
                            <h1 className="text-4xl font-medium text-[#4A0E0E]">{invitationData.groom}</h1>
                            <p className="text-[11px] italic text-[#8B0000] mt-4 font-bold">(Son of {invitationData.groomParents})</p>
                        </div>
                    </header>

                    <section className="w-full bg-[#4A0E0E] text-[#D4AF37] py-8 border-y border-[#D4AF37]/30">
                        <div className="max-w-xs mx-auto grid grid-cols-4 gap-1 text-center">
                            {[{ l: 'Days', v: timeLeft.days }, { l: 'Hrs', v: timeLeft.hours }, { l: 'Mins', v: timeLeft.minutes }, { l: 'Secs', v: timeLeft.seconds }].map((item, i) => (
                                <div key={i}>
                                    <div className="text-2xl font-bold">{String(item.v).padStart(2, '0')}</div>
                                    <div className="text-[8px] uppercase tracking-widest opacity-70">{item.l}</div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <main className="w-full max-w-md px-4 py-12 space-y-8">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-[#F3E5AB] text-center">
                            <Icon name="calendar" className="text-[#B8860B] mb-2" />
                            <h3 className="text-lg font-bold tracking-widest uppercase mb-4">Sumuhurtham</h3>
                            <p className="text-xl font-bold text-[#4A0E0E]">{invitationData.weddingDate}</p>
                            <p className="italic text-[#8B0000] font-semibold">{invitationData.weddingTime}</p>
                            <p className="text-xs italic py-2 px-4 bg-[#FFFDF6] rounded-lg border border-dashed border-[#B8860B]/30 mt-4 inline-block">"{invitationData.muhurtham}"</p>
                        </div>

                        <div className="text-center space-y-6">
                            <h3 className="text-xl font-bold text-[#4A0E0E]">Venue</h3>
                            <p className="text-lg font-bold text-[#8B0000]">{invitationData.venue}</p>
                            <p className="text-xs text-gray-500">{invitationData.address}</p>
                            <div className="flex flex-col gap-3 max-w-xs mx-auto">
                                <button onClick={handleOpenMaps} className="bg-[#B8860B] text-white py-4 rounded-xl font-bold uppercase tracking-widest text-[11px]">Google Maps Location</button>
                                <button onClick={handleSaveDate} className="border-2 border-[#B8860B] text-[#B8860B] py-4 rounded-xl font-bold uppercase tracking-widest text-[11px]">Add to Calendar</button>
                            </div>
                        </div>
                    </main>

                    <footer className="w-full bg-[#4A0E0E] text-[#D4AF37] py-12 text-center mt-8">
                        <p className="text-[10px] italic uppercase tracking-widest">With best compliments from</p>
                        <p className="text-2xl font-bold text-[#F3E5AB] mt-2">Near & Dear</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
